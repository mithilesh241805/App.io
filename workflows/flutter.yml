name: 📱 Flutter Android Build

on:
  push:
    branches: [main]
    paths:
      - 'flutter/**'
      - '.github/workflows/flutter.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
    paths:
      - 'flutter/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options: [debug, release]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ── Build APK ─────────────────────────────────────────────
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Inject google-services.json from secret ───────────
      - name: Create google-services.json
        working-directory: flutter/android/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      # ── Inject key.properties for signing ─────────────────
      - name: Create key.properties
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        working-directory: flutter/android
        run: |
          cat > key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore/release.jks
          EOF

      - name: Decode keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        working-directory: flutter
        run: |
          mkdir -p android/keystore
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > android/keystore/release.jks

      # ── Inject backend URL into Dart config ───────────────
      - name: Set backend URL
        working-directory: flutter
        run: |
          sed -i "s|https://your-api.com/api|${{ vars.BACKEND_API_URL }}|g" \
            lib/services/auth_service.dart \
            lib/screens/file_manager_screen.dart \
            lib/screens/plans_screen.dart \
            lib/screens/download_screen.dart

      # ── Build debug APK (PRs) ─────────────────────────────
      - name: Build debug APK
        if: github.event_name == 'pull_request'
        working-directory: flutter
        run: flutter build apk --debug --target-platform android-arm64

      # ── Build release APKs (main / tags) ──────────────────
      - name: Build release APKs (split per ABI)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        working-directory: flutter
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: Build App Bundle (for Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: flutter
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info/

      # ── Upload APK artifacts ──────────────────────────────
      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APKs
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: Upload App Bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────
  release:
    name: 🎉 Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: apks/

      - name: Download App Bundle
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: bundle/

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "SDUCS-MK ${{ steps.tag.outputs.version }}"
          body: |
            ## 📱 SDUCS – MK Multitasking ${{ steps.tag.outputs.version }}

            ### Downloads
            | File | Architecture | Size |
            |------|-------------|------|
            | `app-arm64-v8a-release.apk` | ARM64 (most modern phones) | - |
            | `app-armeabi-v7a-release.apk` | ARM32 (older phones) | - |
            | `app-x86_64-release.apk` | x86_64 (emulators) | - |
            | `app-release.aab` | App Bundle (Play Store) | - |

            ### What's New
            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Installation
            1. Download the APK for your device architecture
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
          files: |
            apks/*.apk
            bundle/*.aab
          draft: false
          prerelease: false
