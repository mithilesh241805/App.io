name: sducs_mk
description: SDUCS – MK Multitasking App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core:         ^2.24.2
  firebase_auth:         ^4.16.0
  firebase_storage:      ^11.6.0
  cloud_firestore:       ^4.14.0

  # Google Auth
  google_sign_in:        ^6.2.1

  # Ads
  google_mobile_ads:     ^4.0.0

  # HTTP & State
  http:                  ^1.2.0
  provider:              ^6.1.1
  shared_preferences:    ^2.2.2

  # File Management
  file_picker:           ^6.1.1
  path_provider:         ^2.1.2
  permission_handler:    ^11.3.0
  crypto:                ^3.0.3
  device_info_plus:      ^9.1.2

  # Downloads
  flutter_downloader:    ^1.11.7
  open_file:             ^3.3.2

  # UI
  flutter_svg:           ^2.0.9
  cached_network_image:  ^3.3.1
  shimmer:               ^3.0.0
  lottie:                ^3.1.0
  url_launcher:          ^6.2.4
  share_plus:            ^7.2.2

  # QR
  qr_flutter:            ^4.1.0
  qr_code_scanner:       ^1.0.1

  # Payments
  razorpay_flutter:      ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
