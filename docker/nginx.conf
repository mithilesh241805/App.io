# ============================================================
#  SDUCS – MK  |  Nginx Production Config
#  Replace yourdomain.com with your actual domain
# ============================================================

events {
    worker_connections 1024;
}

http {
    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/rss+xml text/javascript
               image/svg+xml;

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com api.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ── Web App (React) ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;

        location / {
            proxy_pass         http://web:80;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                proxy_pass http://web:80;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

    # ── Backend API ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.yourdomain.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 5120M;  # Allow 5GB uploads

        # Health endpoint (no rate limit)
        location /health {
            proxy_pass http://backend:5000;
            access_log off;
        }

        # Auth endpoints (strict rate limit)
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # File upload (rate limited separately)
        location /api/files/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass            http://backend:5000;
            proxy_http_version    1.1;
            proxy_set_header      Host $host;
            proxy_set_header      X-Real-IP $remote_addr;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_request_buffering off;
        }

        # Razorpay webhook (no rate limit — webhook IPs)
        location /api/payments/webhook {
            proxy_pass         http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # All other API endpoints
        location /api {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
        }
    }
}
